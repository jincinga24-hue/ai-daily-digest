<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Decorative grid lines -->
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#ffffff08" stroke-width="1"/>
  <line x1="0" y1="510" x2="1200" y2="510" stroke="#ffffff08" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="630" stroke="#ffffff05" stroke-width="1"/>
  <line x1="1100" y1="0" x2="1100" y2="630" stroke="#ffffff05" stroke-width="1"/>

  <!-- Lightning bolt icon -->
  <text x="100" y="310" font-family="system-ui, sans-serif" font-size="120" fill="#6366f1" opacity="0.8">⚡</text>

  <!-- Site title -->
  <text x="260" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="700" fill="#e8e8f0" letter-spacing="-1">The Daily AI Shift</text>

  <!-- Tagline -->
  <text x="262" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="30" fill="#8888a0" letter-spacing="0">Tracking how AI reshapes industries and careers</text>

  <!-- Divider -->
  <rect x="262" y="370" width="200" height="3" fill="url(#accent)" rx="2"/>

  <!-- URL hint -->
  <text x="262" y="430" font-family="monospace, system-ui" font-size="22" fill="#6366f155">thedailyaishift.com</text>
</svg>
